<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Login - Ujian Akhir Semester</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="auth-container">
        <div class="visual-panel">
            <div class="brand-header">
                <span class="logo-icon">🔒</span> Keamanan Informasi
            </div>
            
            <div class="illustration-box">
                <div class="blob shape-1"></div>
                <div class="blob shape-2"></div>
                <div class="blob shape-3">
                    <div class="inner-text">
                        <h2>Case Study</h2>
                        <p>Web Security Audit</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="login-panel">
            <div class="form-wrapper">
                <h1>LOGIN</h1>
                
                <form action="#" method="POST" class="secure-form">
                    <div class="input-group">
                        <label for="username">Username</label>
                        <div class="input-wrapper">
                            <span class="input-icon">👤</span>
                            <input type="text" id="username" name="username" placeholder="Masukkan username" required>
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <span class="input-icon">🔑</span>
                            <input type="password" id="password" name="password" placeholder="Masukkan password" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-submit">LOGIN</button>
                </form>
            </div>
            
            <footer class="panel-footer">
                <p>&copy; 2026 Tugas Project Case Study[cite: 1]</p>
            </footer>
        </div>
    </div>

</body>
</html>
